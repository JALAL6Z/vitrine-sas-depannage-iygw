<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAS Dépannage — Remorquage & Assistance Lyon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* =============================================
   CSS VARIABLES & RESET
   ============================================= */
:root {
  --dark-bg: #08111f;
  --dark-card: #0d1928;
  --dark-border: #1a2a3a;
  --gold: #c9963a;
  --gold-light: #e2b96a;
  --gold-dark: #a07828;
  --white: #f5f0e8;
  --white-dim: rgba(245, 240, 232, 0.7);
  --red-banner: #991b1b;
  --font-serif: 'Playfair Display', Georgia, serif;
  --font-sans: 'DM Sans', sans-serif;
  --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  --shadow-gold: 0 0 40px rgba(201, 150, 58, 0.15);
  --radius: 6px;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  background: var(--dark-bg);
  color: var(--white);
  font-family: var(--font-sans);
  font-weight: 400;
  line-height: 1.6;
  overflow-x: hidden;
}

/* =============================================
   TIMER BANNER — STICKY TOP
   ============================================= */
#timer-banner {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: var(--red-banner);
  text-align: center;
  padding: 10px 20px;
  font-family: var(--font-sans);
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

#timer-banner span.label {
  opacity: 0.9;
}

#timer-banner span.timer {
  font-family: var(--font-serif);
  font-size: 1rem;
  font-weight: 700;
  background: rgba(0,0,0,0.25);
  padding: 2px 12px;
  border-radius: 4px;
  letter-spacing: 0.08em;
  color: #fff;
}

/* =============================================
   NAVIGATION
   ============================================= */
nav {
  position: sticky;
  top: 41px;
  z-index: 999;
  background: rgba(8, 17, 31, 0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--dark-border);
  padding: 0 40px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.nav-logo .logo-icon {
  font-size: 1.6rem;
  line-height: 1;
}

.nav-logo .logo-text {
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--white);
  line-height: 1.2;
}

.nav-logo .logo-text span {
  display: block;
  font-family: var(--font-sans);
  font-size: 0.65rem;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 32px;
  list-style: none;
}

.nav-links a {
  font-family: var(--font-sans);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--white-dim);
  text-decoration: none;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: color var(--transition);
}

.nav-links a:hover {
  color: var(--gold);
}

.nav-cta {
  background: var(--gold);
  color: var(--dark-bg) !important;
  padding: 10px 22px !important;
  border-radius: var(--radius);
  font-weight: 600 !important;
  transition: background var(--transition), transform var(--transition) !important;
  letter-spacing: 0.03em !important;
  text-transform: none !important;
  white-space: nowrap;
}

.nav-cta:hover {
  background: var(--gold-light) !important;
  transform: translateY(-1px);
}

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
}

.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--white);
  border-radius: 2px;
  transition: var(--transition);
}

/* =============================================
   HERO SECTION
   ============================================= */
#hero {
  min-height: calc(100vh - 111px);
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 80px 40px;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 70% 50%, rgba(201, 150, 58, 0.07) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 10% 80%, rgba(201, 150, 58, 0.04) 0%, transparent 60%),
    linear-gradient(135deg, #08111f 0%, #0c1a2e 50%, #08111f 100%);
}

.hero-grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,150,58,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,150,58,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

.hero-left {}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(201, 150, 58, 0.12);
  border: 1px solid rgba(201, 150, 58, 0.3);
  border-radius: 100px;
  padding: 6px 16px;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 28px;
}

.hero-badge::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.4); }
}

.hero-title {
  font-family: var(--font-serif);
  font-size: clamp(2.4rem, 4.5vw, 3.8rem);
  font-weight: 700;
  line-height: 1.15;
  color: var(--white);
  margin-bottom: 24px;
}

.hero-title em {
  font-style: italic;
  color: var(--gold);
  display: block;
}

.hero-subtitle {
  font-size: 1rem;
  color: var(--white-dim);
  line-height: 1.7;
  max-width: 480px;
  margin-bottom: 40px;
  font-weight: 300;
}

.hero-ctas {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--gold);
  color: var(--dark-bg);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 0.9rem;
  letter-spacing: 0.02em;
  transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
}

.btn-primary:hover {
  background: var(--gold-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(201, 150, 58, 0.35);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: var(--radius);
  border: 1px solid var(--dark-border);
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: 0.9rem;
  transition: border-color var(--transition), color var(--transition), transform var(--transition);
}

.btn-secondary:hover {
  border-color: var(--gold);
  color: var(--gold);
  transform: translateY(-2px);
}

/* Hero Right — Stats */
.hero-right {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.stat-card {
  background: var(--dark-card);
  border: 1px solid var(--dark-border);
  border-radius: var(--radius);
  padding: 28px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: border-color var(--transition), transform var(--transition);
}

.stat-card::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity var(--transition);
}

.stat-card:hover {
  border-color: rgba(201,150,58,0.3);
  transform: translateY(-4px);
}

.stat-card:hover::after {
  opacity: 1;
}

.stat-number {
  font-family: var(--font-serif);
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 6px;
}

.stat-label {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--white-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.stat-stars {
  display: flex;
  justify-content: center;
  gap: 3px;
  margin-bottom: 6px;
}

.star {
  color: var(--gold);
  font-size: 1rem;
}

.star.half {
  opacity: 0.5;
}

/* =============================================
   TRUST RIBBON
   ============================================= */
#trust-ribbon {
  background: var(--dark-card);
  border-top: 1px solid var(--dark-border);
  border-bottom: 1px solid var(--dark-border);
  padding: 28px 40px;
}

.trust-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}

.trust-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--white-dim);
  letter-spacing: 0.03em;
}

.trust-item .check {
  color: var(--gold);
  font-size: 1rem;
  font-weight: 700;
  flex-shrink: 0;
}

.trust-divider {
  width: 1px;
  height: 30px;
  background: var(--dark-border);
}

/* =============================================
   MARQUEE
   ============================================= */
#marquee-section {
  overflow: hidden;
  background: var(--dark-bg);
  border-bottom: 1px solid var(--dark-border);
  padding: 20px 0;
}

.marquee-track {
  display: flex;
  gap: 0;
  animation: marquee 30s linear infinite;
  white-space: nowrap;
}

.marquee-item {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 0 40px;
  font-family: var(--font-serif);
  font-size: 0.9rem;
  font-style: italic;
  color: var(--white-dim);
  letter-spacing: 0.03em;
}

.marquee-dot {
  color: var(--gold);
  font-style: normal;
  font-size: 1.2rem;
}

@keyframes marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* =============================================
   SERVICES SECTION
   ============================================= */
#services {
  padding: 100px 40px;
  position: relative;
}

.section-header {
  max-width: 1200px;
  margin: 0 auto 60px;
  text-align: center;
}

.section-tag {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
}

.section-title {
  font-family: var(--font-serif);
  font-size: clamp(2rem, 3.5vw, 3rem);
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
  margin-bottom: 16px;
}

.section-title em {
  font-style: italic;
  color: var(--gold);
}

.section-subtitle {
  font-size: 0.95rem;
  color: var(--white-dim);
  max-width: 540px;
  margin: 0 auto;
  line-height: 1.7;
  font-weight: 300;
}

.services-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}

.service-card {
  background: var(--dark-card);
  border: 1px solid var(--dark-border);
  border-radius: var(--radius);
  padding: 40px 36px;
  position: relative;
  overflow: hidden;
  cursor: default;
  transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
}

.service-card::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent 0%, var(--gold) 50%, transparent 100%);
  transform: scaleX(0);
  transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
}

.service-card:hover {
  border-color: rgba(201, 150, 58, 0.25);
  transform: translateY(-6px);
  box-shadow: var(--shadow-gold);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-number {
  font-family: var(--font-serif);
  font-size: 0.75rem;
  font-weight: 700;
  color: rgba(201, 150, 58, 0.4);
  letter-spacing: 0.15em;
  margin-bottom: 20px;
  display: block;
}

.service-icon {
  font-size: 2.4rem;
  margin-bottom: 20px;
  display: block;
  line-height: 1;
}

.service-name {
  font-family: var(--font-serif);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 14px;
  line-height: 1.2;
}

.service-desc {
  font-size: 0.88rem;
  color: var(--white-dim);
  line-height: 1.7;
  font-weight: 300;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--gold);
  text-decoration: none;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: gap var(--transition);
}

.service-link:hover {
  gap: 14px;
}

/* =============================================
   TESTIMONIALS
   ============================================= */
#testimonials {
  padding: 100px 40px;
  background: var(--dark-card);
  border-top: 1px solid var(--dark-border);
  border-bottom: 1px solid var(--dark-border);
}

.testimonials-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.testimonial-card {
  background: var(--dark-bg);
  border: 1px solid var(--dark-border);
  border-radius: var(--radius);
  padding: 36px 30px;
  position: relative;
  transition: border-color var(--transition), transform var(--transition);
}

.testimonial-card:hover {
  border-color: rgba(201, 150, 58, 0.25);
  transform: translateY(-4px);
}

.testimonial-quote {
  font-size: 3rem;
  font-family: var(--font-serif);
  color: var(--gold);
  opacity: 0.3;
  line-height: 1;
  margin-bottom: 16px;
}

.testimonial-text {
  font-size: 0.88rem;
  color: var(--white-dim);
  line-height: 1.75;
  font-weight: 300;
  font-style: italic;
  margin-bottom: 24px;
}

.testimonial-stars {
  display: flex;
  gap: 3px;
  margin-bottom: 20px;
}

.testimonial-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.author-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--dark-bg);
  flex-shrink: 0;
}

.author-info .author-name {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--white);
  line-height: 1.2;
}

.author-info .author-meta {
  font-size: 0.72rem;
  color: var(--white-dim);
  margin-top: 2px;
  letter-spacing: 0.05em;
}

/* =============================================
   CTA FINAL
   ============================================= */
#cta-final {
  padding: 100px 40px;
  position: relative;
  overflow: hidden;
}

.cta-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(201, 150, 58, 0.06) 0%, transparent 70%);
}

.cta-inner {
  max-width: 1000px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
  text-align: center;
}

.cta-title {
  font-family: var(--font-serif);
  font-size: clamp(2rem, 3.5vw, 3rem);
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
  margin-bottom: 20px;
}

.cta-title em {
  font-style: italic;
  color: var(--gold);
}

.cta-subtitle {
  font-size: 0.95rem;
  color: var(--white-dim);
  margin-bottom: 50px;
  font-weight: 300;
}

.price-boxes {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 48px;
}

.price-box {
  background: var(--dark-card);
  border: 1px solid var(--dark-border);
  border-radius: var(--radius);
  padding: 32px 24px;
  text-align: center;
  position: relative;
  transition: border-color var(--transition), transform var(--transition);
}

.price-box.featured {
  border-color: var(--gold);
  background: rgba(201, 150, 58, 0.05);
}

.price-box.featured::before {
  content: 'Populaire';
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--gold);
  color: var(--dark-bg);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 14px;
  border-radius: 100px;
}

.price-box:hover {
  border-color: rgba(201, 150, 58, 0.4);
  transform: translateY(-4px);
}

.price-box-icon {
  font-size: 2rem;
  margin-bottom: 12px;
  display: block;
}

.price-box-name {
  font-family: var(--font-serif);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 8px;
}

.price-box-desc {
  font-size: 0.78rem;
  color: var(--white-dim);
  line-height: 1.5;
  font-weight: 300;
}

.price-box-tag {
  display: inline-block;
  margin-top: 14px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--gold);
  text-transform: uppercase;
}

.cta-buttons {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.cta-note {
  margin-top: 20px;
  font-size: 0.75rem;
  color: rgba(245, 240, 232, 0.35);
  letter-spacing: 0.05em;
}

/* =============================================
   FOOTER
   ============================================= */
footer {
  background: var(--dark-card);
  border-top: 1px solid var(--dark-border);
  padding: 50px 40px 32px;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.footer-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 40px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.footer-brand {}

.footer-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.footer-logo-icon {
  font-size: 1.8rem;
}

.footer-logo-name {
  font-family: var(--font-serif);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--white);
}

.footer-tagline {
  font-size: 0.82rem;
  color: var(--white-dim);
  font-weight: 300;
  max-width: 260px;
  line-height: 1.6;
}

.footer-contact {}

.footer-contact-title {
  font-family: var(--font-serif);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.footer-phone {
  display: block;
  font-family: var(--font-serif);
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--white);
  text-decoration: none;
  transition: color var(--transition);
  margin-bottom: 8px;
}

.footer-phone:hover {
  color: var(--gold);
}

.footer-address {
  font-size: 0.82rem;
  color: var(--white-dim);
  line-height: 1.6;
  font-weight: 300;
}

.footer-hours {}

.footer-hours-title {
  font-family: var(--font-serif);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.hours-item {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  font-size: 0.8rem;
  color: var(--white-dim);
  margin-bottom: 6px;
  font-weight: 300;
}

.hours-item .day {
  color: var(--white);
  font-weight: 500;
}

.footer-bottom {
  padding-top: 28px;
  border-top: 1px solid var(--dark-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
